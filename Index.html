<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dravexo AI Analytics</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:28px;
background:#0f172a;
}

.container{
width:95%;
margin:auto;
}

.dashboard{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:20px;
}

.card{
flex:1;
min-width:180px;
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

#map{
height:450px;
margin-top:20px;
border-radius:10px;
border:2px solid #38bdf8;
}

</style>

</head>

<body>

<header>Dravexo AI Dashboard</header>

<div class="container">

<div class="dashboard">

<div class="card">
Visitors
<h2 id="visitors">0</h2>
</div>

<div class="card">
Page Views
<h2 id="views">0</h2>
</div>

<div class="card">
Device
<h2 id="device">Detecting</h2>
</div>

<div class="card">
Time
<h2 id="time"></h2>
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// VISITORS

let visitors = localStorage.getItem("visitors");

if(visitors==null){
visitors=1;
}else{
visitors++;
}

localStorage.setItem("visitors",visitors);
document.getElementById("visitors").innerText=visitors;


// PAGE VIEWS

let views = localStorage.getItem("views");

if(views==null){
views=1;
}else{
views++;
}

localStorage.setItem("views",views);
document.getElementById("views").innerText=views;


// DEVICE

if(/Mobi|Android/i.test(navigator.userAgent)){
document.getElementById("device").innerText="Mobile";
}else{
document.getElementById("device").innerText="Desktop";
}


// TIME

function updateTime(){
document.getElementById("time").innerText =
new Date().toLocaleTimeString();
}

setInterval(updateTime,1000);


// MAP START

var map = L.map('map').setView([20.5937,78.9629],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


// USER LOCATION

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

var lat = position.coords.latitude;
var lon = position.coords.longitude;

map.setView([lat,lon],12);

L.marker([lat,lon]).addTo(map)
.bindPopup("You are here")
.openPopup();

}, function(){

L.marker([28.6139,77.2090]).addTo(map)
.bindPopup("Default Location")
.openPopup();

});

}

</script>

</body>
</html>
