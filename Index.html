<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Map - Nishant Demo</title>
  
  <!-- Leaflet CSS (interactive map ke liye) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5n/N0aVIE=" crossorigin=""/>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Top Ad Placeholder (Adsterra ke liye) -->
  <div class="ad-top">
    <p>[Adsterra Banner Placeholder - 728×90]</p>
  </div>

  <!-- Map ID -->
  <div id="map"></div>

  <!-- Visitor Counter (Dassword / Hits) -->
  <div class="visitor-counter">
    <h2>Kitne Log Aaye Hain (Visitors Count)</h2>
    <!-- Hits Badge – Yeh apne actual repo URL se update kar (generator se) -->
    <!-- Current example: https://dravexo.github.io/map-website/ (hyphen remove karke) -->
    <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fdravexo.github.io%2Fmap-website%2F&count_bg=%2379C83D&title_bg=%23555555&icon=&icon_color=%23E7E7E7&title=Total+Visitors&edge_flat=false" alt="Visitors Count Badge" />
    <!-- Generator link: https://hits.seeyoufarm.com pe jaake apna exact URL daal aur img code copy kar lo -->
  </div>

  <!-- Bottom Ad Placeholder -->
  <div class="ad-bottom">
    <p>[Adsterra Footer / Native Ads Placeholder]</p>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- Custom JS -->
  <script src="script.js"></script>
</body>
</html>
